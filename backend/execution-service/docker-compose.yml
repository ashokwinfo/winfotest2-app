version: "3.9"
services:
  execution-service:
    build: .
    container_name: ps_execution
    restart: unless-stopped
    ports:
      - "8003:8003"
    env_file:
      - envs/${APP_ENV:-dev}.env
    volumes:
      - videos:/app/videos
    extra_hosts:
      - "host.docker.internal:172.25.112.1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
volumes:
  videos:
