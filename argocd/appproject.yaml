apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: winfotest2-0-dev
  namespace: argocd
spec:
  description: "WinfoTest2.0 DEV environment"
  sourceRepos:
    - "https://github.com/ashokwinfo/*"
  destinations:
    - namespace: winfotest-os
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"